<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e3a8a">
    <title>BARLA STORE v17.9 PREMIUM</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: "Segoe UI", sans-serif; background: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* FORMAT PRINTER THERMAL (Tabel Klasik Rata 100%) */
        @media print {
            body * { display: none !important; }
            #areaStruk, #areaStruk * { display: block !important; visibility: visible !important; }
            #areaStruk { position: absolute; left: 0; top: 0; width: 48mm; font-size: 8pt; line-height: 1.3; color: #000; font-family: monospace; }
            .line { border-bottom: 1px dashed black; margin: 5px 0; }
            .text-center { text-align: center; }
            .text-right { text-align: right; }
            .bold { font-weight: bold; }
            .uppercase { text-transform: uppercase; }
            table { width: 100%; border-collapse: collapse; }
            td { vertical-align: top; padding-bottom: 2px; }
        }

        /* UI Kasir & Navigasi */
        .tab-active { background: #1e3a8a; color: white !important; }
        .sheet-bg { background: rgba(15, 23, 42, 0.8); z-index: 1000; position: fixed; inset: 0; display: none; align-items: flex-end; }
        .sheet-content { background: white; width: 100%; border-radius: 2rem 2rem 0 0; padding: 2rem; transform: translateY(100%); transition: transform 0.3s; }
        .sheet-active .sheet-content { transform: translateY(0); }
        .modal-bg { background: rgba(15, 23, 42, 0.9); z-index: 1200; position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 20px; }
        
        nav { height: 48px; } 
        .nav-btn { transition: all 0.2s; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
        .nav-btn i { font-size: 15px; } 
        .nav-btn span { font-size: 9px; font-weight: 700; text-transform: uppercase; } 
        .active-nav { color: #1e3a8a !important; background: #f1f5f9; border-top: 2px solid #1e3a8a; }

        /* Animasi Scanner Adaptif */
        .premium-scan { width: 34px; height: 34px; border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .premium-scan::before { content: ""; width: 80%; height: 2px; background: #ff0000; position: absolute; box-shadow: 0 0 8px #ff0000; animation: laser 1.5s infinite ease-in-out; z-index: 10; }
        @keyframes laser { 0%, 100% { top: 20%; } 50% { top: 75%; } }
    </style>
</head>
<body class="pb-20">

    <header class="bg-blue-900 p-3 text-white shadow-md sticky top-0 z-50 flex justify-between items-center no-print">
        <div>
            <h1 class="text-base font-black italic uppercase leading-none">BARLA STORE</h1>
            <p id="h-time" class="text-[8px] text-yellow-400 font-bold mt-1 uppercase"></p>
        </div>
        <div class="flex items-center gap-4">
            <div id="h-kasir">
                <button onclick="toggleScanner('auto')" class="active:scale-75 transition">
                    <div class="premium-scan w-7 h-7 border-2 border-white"></div>
                </button>
            </div>
            <div id="h-stok" class="hidden gap-4">
                <button onclick="exportCSV()" class="text-green-400 flex flex-col items-center">
                    <i class="fas fa-file-export text-base"></i><span class="text-[7px] font-bold mt-0.5 uppercase">Save</span>
                </button>
                <button onclick="document.getElementById('fIn').click()" class="text-blue-300 flex flex-col items-center">
                    <i class="fas fa-file-import text-base"></i><span class="text-[7px] font-bold mt-0.5 uppercase">Load</span>
                </button>
                <input type="file" id="fIn" class="hidden" accept=".csv, text/csv" onchange="importCSV(this)">
            </div>
        </div>
    </header>

    <div id="camera-box" class="hidden p-3 no-print bg-white border-b shadow-lg">
        <div id="scanner-layer" class="w-full h-56 bg-black rounded-2xl overflow-hidden border-4 border-slate-100"></div>
        <button onclick="toggleScanner()" class="w-full bg-red-600 text-white font-black py-3 mt-2 rounded-xl uppercase text-sm italic active:scale-95 transition">Tutup Kamera</button>
    </div>

    <main class="max-w-md mx-auto p-2 no-print">
        
        <div id="section-kasir" class="pb-48 pt-1"> 
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 mb-2">
                <div class="flex gap-2 mb-2">
                    <div class="relative flex-1">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input type="text" id="k-nama" list="db-list" oninput="handleInputNama(this)" placeholder="Nama Barang / Scan..." class="w-full pl-8 pr-3 py-2 bg-slate-50 border border-slate-200 rounded-lg font-bold text-xs outline-none focus:border-blue-600 transition-all">
                        <datalist id="db-list"></datalist>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <div class="relative w-2/5">
                        <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-[9px] font-black text-slate-400">Rp</span>
                        <input type="text" id="k-harga" inputmode="numeric" oninput="formatRupiah(this)" placeholder="Harga" class="w-full pl-7 pr-2 py-2 bg-slate-50 border border-slate-200 rounded-lg font-bold text-xs outline-none focus:border-blue-600 transition-all">
                    </div>
                    <input type="number" id="k-qty" inputmode="numeric" placeholder="Qty" class="w-1/5 px-1 py-2 bg-slate-50 border border-slate-200 rounded-lg font-bold text-xs text-center outline-none focus:border-blue-600 transition-all">
                    <button onclick="tambahItem()" class="w-2/5 bg-blue-700 hover:bg-blue-800 text-white font-bold text-xs rounded-lg shadow-sm active:scale-95 transition flex items-center justify-center gap-1">
                        <i class="fas fa-plus"></i> ADD
                    </button>
                </div>
            </div>
            
            <div id="list-cart" class="space-y-1.5"></div>
            
            <div id="p-bayar" class="fixed bottom-[48px] left-0 w-full bg-white px-4 py-3 shadow-[0_-4px_15px_rgba(0,0,0,0.08)] border-t border-slate-200 z-30">
                <div class="flex justify-between items-center mb-2 gap-3 max-w-md mx-auto">
                    <div class="flex flex-col">
                        <span class="text-[9px] font-black text-slate-400 uppercase tracking-wide">Total</span>
                        <span id="t-total" class="text-2xl font-black text-blue-900 leading-none tracking-tighter">Rp 0</span>
                    </div>
                    <div class="w-1/2">
                        <input type="text" id="i-bayar" inputmode="numeric" oninput="formatRupiah(this)" placeholder="Bayar" class="w-full text-right text-base font-black text-slate-800 bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-lg outline-none focus:border-blue-500 focus:bg-white transition-all">
                    </div>
                </div>
                
                <div class="max-w-md mx-auto">
                    <div id="b-kembali" class="hidden flex justify-between items-center bg-green-50 border border-green-100 rounded-lg p-1.5 px-3 mb-2 transition-all">
                        <span class="text-[10px] font-bold text-green-600 uppercase">Kembali</span>
                        <span id="t-kembali" class="text-sm font-black text-green-700">Rp 0</span>
                    </div>
                    
                    <div class="flex gap-2">
                        <button onclick="checkout('wa')" class="flex-1 bg-[#25D366] hover:bg-green-600 text-white font-bold py-2.5 rounded-lg shadow-sm uppercase text-[11px] tracking-wider active:scale-95 transition flex justify-center items-center gap-1.5">
                            <i class="fab fa-whatsapp text-sm"></i> WhatsApp
                        </button>
                        <button onclick="checkout('print')" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg shadow-sm uppercase text-[11px] tracking-wider active:scale-95 transition flex justify-center items-center gap-1.5">
                            <i class="fas fa-print text-sm"></i> Cetak
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-stok" class="hidden space-y-4">
            <div class="flex bg-white rounded-xl shadow-sm p-1 border border-slate-100 mb-4 mt-1">
                <button onclick="tab('sup')" id="b-sup" class="flex-1 py-2 text-[10px] font-black uppercase rounded-lg tab-active transition">Supplier</button>
                <button onclick="tab('retur')" id="b-retur" class="flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition">Retur</button>
                <button onclick="tab('lap')" id="b-lap" class="flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition">Laporan</button>
            </div>
            <div id="stok-content" class="space-y-3 pb-20"></div>
            <button onclick="openModalSup()" id="fab" class="fixed right-5 bottom-16 w-12 h-12 bg-blue-900 text-white rounded-xl shadow-lg flex items-center justify-center text-lg z-40 active:scale-90 transition border-2 border-blue-800"><i class="fas fa-plus"></i></button>
        </div>
    </main>

    <div id="a-sheet" class="sheet-bg" onclick="closeSheet(event)"><div class="sheet-content"><div id="sheet-opts" class="grid gap-3"></div></div></div>
    <div id="b-modal" class="modal-bg">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 shadow-2xl space-y-4 border-t-[8px] border-blue-900">
            <h3 id="m-title" class="font-black text-slate-800 text-center uppercase text-lg italic"></h3>
            <p id="m-desc" class="text-[11px] text-slate-500 font-bold text-center uppercase whitespace-pre-wrap"></p>
            <div id="m-input-box"><input type="text" id="m-input" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-center text-xl font-black outline-none focus:border-blue-600 text-blue-900"></div>
            <div class="flex gap-2 pt-1">
                <button onclick="closeModal()" class="flex-1 py-3 text-xs font-black text-slate-400 uppercase rounded-xl hover:bg-slate-50 transition">Batal</button>
                <button id="m-confirm" class="flex-1 py-3 bg-blue-700 text-white rounded-xl text-xs font-black shadow-sm uppercase active:scale-95 transition">Oke</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around no-print z-50">
        <button onclick="mode('kasir')" id="n-k" class="nav-btn text-slate-400 active-nav">
            <i class="fas fa-store"></i><span>Kasir</span>
        </button>
        <button onclick="mode('stok')" id="n-s" class="nav-btn text-slate-400">
            <i class="fas fa-box-open"></i><span>Stok</span>
        </button>
    </nav>

    <div id="areaStruk" class="hidden"><div id="p-konten"></div></div>

    <script>
        const KEY = 'BARLA_ULTRA_V17_9_FIX';
        let db = { supplier: [], retur: [] };
        let cart = [];
        let curTab = 'sup', selS = null, selB = null, selRetur = null, isScanning = false, html5QrCode = null, openIdx = null;

        window.onload = () => { 
            try {
                const data = localStorage.getItem(KEY); 
                if (data) db = JSON.parse(data);
                if (!db.supplier) db.supplier = [];
                if (!db.retur) db.retur = [];
            } catch(e) { db = { supplier: [], retur: [] }; }
            refreshClock(); setInterval(refreshClock, 60000); refreshDL(); renderStok('sup'); 
            if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }
            setupScannerEvents();
        };

        // Deteksi Enter Alat Scanner Fisik
        function setupScannerEvents() {
            const kNama = document.getElementById('k-nama');
            kNama.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleInputNama(this);
                    setTimeout(() => {
                        const hrg = clean(document.getElementById('k-harga').value);
                        if (hrg > 0) tambahItem(); else document.getElementById('k-harga').focus();
                    }, 100);
                }
            });
            document.getElementById('k-harga').addEventListener('keypress', e => { if(e.key==='Enter') tambahItem(); });
            document.getElementById('k-qty').addEventListener('keypress', e => { if(e.key==='Enter') tambahItem(); });
        }

        function escapeHTML(str) { return str ? str.toString().replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])) : ""; }
        function saveData() { localStorage.setItem(KEY, JSON.stringify(db)); refreshDL(); if (!document.getElementById('section-stok').classList.contains('hidden')) renderStok(curTab); }
        function formatRupiah(el) { let v = el.value.replace(/[^0-9]/g, ""); el.value = v ? new Intl.NumberFormat('id-ID').format(v) : ""; if (el.id === 'i-bayar') updateChange(); }
        function clean(s) { return parseInt(s.toString().replace(/[^0-9]/g, "")) || 0; }
        
        function refreshClock() { 
            const opt = { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }; 
            document.getElementById('h-time').innerText = new Date().toLocaleDateString('id-ID', opt).replace(/\./g, ':'); 
        }
        function getTglStr() { return new Date().toLocaleDateString('id-ID', {day: '2-digit', month: '2-digit', year: 'numeric'}); }
        function getJamStr() { return new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'}).replace(/\./g, ':'); }

        // --- KASIR LOGIC ---
        function handleInputNama(el) {
            let val = el.value;
            if (!val) { document.getElementById('k-harga').value = ""; return; }
            el.value = val.split(' ').map(w => /^(PVC|SNI|P\/C)$/i.test(w) ? w.toUpperCase() : w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
            let found = null;
            for (let s of db.supplier) {
                for (let b of s.barang) {
                    if (b.nama.toUpperCase() === el.value.toUpperCase() || b.bc === el.value) {
                        if (b.stok > 0) { found = b; break; } else if (!found) found = b;
                    }
                }
                if (found && found.stok > 0) break;
            }
            if (found) {
                el.value = found.nama;
                document.getElementById('k-harga').value = found.harga.toLocaleString('id-ID');
            }
        }

        async function toggleScanner(target = 'auto') {
            const wrap = document.getElementById('camera-box');
            if (isScanning) { 
                if (html5QrCode) { try { await html5QrCode.stop(); html5QrCode.clear(); } catch(e){} } 
                wrap.classList.add('hidden'); isScanning = false; 
            } else { 
                wrap.classList.remove('hidden'); isScanning = true; 
                html5QrCode = new Html5Qrcode("scanner-layer"); 
                html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 200 }, (decoded) => { 
                    const code = decoded.trim(); 
                    if (target === 'auto') { 
                        let f = null; db.supplier.forEach(s => s.barang.forEach(b => { if (b.bc === code) f = b; })); 
                        if (f) { document.getElementById('k-nama').value = f.nama; document.getElementById('k-harga').value = f.harga.toLocaleString('id-ID'); document.getElementById('k-qty').value = 1; tambahItem(); } 
                        else { openModal("BARCODE TIDAK ADA", "", "Produk belum terdaftar.", null, "text"); } 
                    } else { document.getElementById(target).value = code; } 
                    toggleScanner(); 
                }).catch(() => { 
                    isScanning = false; wrap.classList.add('hidden'); 
                    openModal("GAGAL KAMERA", "", "Kamera tidak didukung / Error.", null, "text");
                }); 
            }
        }

        function refreshDL() {
            const dl = document.getElementById('db-list'); dl.innerHTML = "";
            db.supplier.forEach(s => s.barang.forEach(b => { 
                const inC = cart.find(x => x.nama.toUpperCase() === b.nama.toUpperCase() && x.harga === b.harga);
                if (b.stok > 0 && (!inC || inC.qty < b.stok)) {
                    let o = document.createElement('option'); o.value = b.nama; 
                    o.innerText = `Rp ${b.harga.toLocaleString('id-ID')} | Sisa: ${inC ? (b.stok - inC.qty) : b.stok}`; dl.appendChild(o); 
                }
            }));
        }

        function tambahItem() {
            const nI = document.getElementById('k-nama'), hI = document.getElementById('k-harga'), qI = document.getElementById('k-qty');
            const n = nI.value.trim(), h = clean(hI.value); let q = Math.abs(parseInt(qI.value)) || 1;
            if (!n || h <= 0) return;
            let totalStok = 0, registered = false;
            db.supplier.forEach(s => s.barang.forEach(b => { if (b.nama.toUpperCase() === n.toUpperCase()) { totalStok += b.stok; registered = true; } }));
            if (!registered) { openModal("TIDAK TERDAFTAR", "", `Barang "${n}" tidak ada di stok!`, null, "text"); return; }
            let itemDiCart = cart.find(x => x.nama.toUpperCase() === n.toUpperCase() && x.harga === h);
            let minta = q; cart.forEach(x => { if (x.nama.toUpperCase() === n.toUpperCase()) minta += x.qty; });
            if (minta > totalStok) { openModal("STOK TIDAK CUKUP", "", `Sisa total ${n}: ${totalStok}`, null, "text"); return; }
            if (itemDiCart) itemDiCart.qty += q; else cart.push({ nama: n, harga: h, qty: q });
            nI.value = ""; hI.value = ""; qI.value = ""; renderCart(); refreshDL();
            nI.focus();
        }

        function renderCart() {
            const l = document.getElementById('list-cart'); l.innerHTML = ""; 
            let tot = 0;
            cart.forEach((k, i) => { 
                let sub = k.harga * k.qty; tot += sub;
                l.innerHTML += `
                    <div class="bg-white p-3 rounded-xl flex items-center justify-between border border-slate-100 shadow-sm relative overflow-hidden">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-600"></div>
                        <div class="pl-2 flex-1">
                            <h4 class="text-xs font-black text-slate-800 uppercase leading-tight mb-1">${escapeHTML(k.nama)}</h4>
                            <div class="flex items-center text-[9px] font-bold text-slate-500 gap-1.5">
                                <span class="bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded border border-blue-100">${k.qty}x</span>
                                <span>@ Rp ${k.harga.toLocaleString('id-ID')}</span>
                            </div>
                        </div>
                        <div class="text-right flex flex-col items-end justify-center gap-1">
                            <span class="text-blue-900 font-black text-[13px] tracking-tight">${sub.toLocaleString('id-ID')}</span>
                            <button onclick="cart.splice(${i},1);renderCart();refreshDL();" class="text-red-500 flex items-center gap-1 text-[8px] uppercase font-black active:scale-90 transition bg-red-50 px-2 py-1 rounded border border-red-100">
                                <i class="fas fa-trash-alt"></i> Hapus
                            </button>
                        </div>
                    </div>`;
            });
            document.getElementById('t-total').innerText = "Rp " + tot.toLocaleString('id-ID'); updateChange();
        }

        function updateChange() {
            const t = cart.reduce((s, i) => s + (i.harga * i.qty), 0);
            const b = clean(document.getElementById('i-bayar').value);
            const box = document.getElementById('b-kembali'); 
            if (b >= t && t > 0) { 
                box.classList.remove('hidden'); 
                document.getElementById('t-kembali').innerText = "Rp " + (b - t).toLocaleString('id-ID'); 
            } else { 
                box.classList.add('hidden'); 
            }
        }

        // --- CHECKOUT (CETAK & WA) ---
        function checkout(tipeCheckout) {
            const t = cart.reduce((s, i) => s + (i.harga * i.qty), 0);
            const b = clean(document.getElementById('i-bayar').value);
            
            if (cart.length === 0) { openModal("KERANJANG KOSONG", "", "Belum ada barang yang ditambahkan!", null, "text"); return; }
            if (!b || b < t) { openModal("UANG MASIH KURANG", "", `Kurang: Rp ${(t - b).toLocaleString('id-ID')}`, () => document.getElementById('i-bayar').focus(), "text"); return; }
            
            const rec = {}; cart.forEach(i => { let k = i.nama.toUpperCase() + "_" + i.harga; rec[k] = (rec[k] || 0) + i.qty; });
            for (let k in rec) {
                let [nM, hM] = k.split("_"), sT = 0;
                db.supplier.forEach(s => s.barang.forEach(brg => { if (brg.nama.toUpperCase() === nM && brg.harga === parseInt(hM)) sT += brg.stok; }));
                if (rec[k] > sT) { openModal("STOK BERUBAH", "", `Stok ${nM} tidak cukup!`, null, "text"); return; }
            }
            
            // Potong Stok
            cart.forEach(iC => {
                let sisa = iC.qty;
                for (let s of db.supplier) {
                    if (sisa <= 0) break;
                    for (let brg of s.barang) {
                        if (brg.nama.toUpperCase() === iC.nama.toUpperCase() && brg.harga === iC.harga) {
                            if (brg.stok >= sisa) { brg.stok -= sisa; sisa = 0; } else { sisa -= brg.stok; brg.stok = 0; }
                            if (sisa <= 0) break;
                        }
                    }
                }
            });
            
            // JIKA TOMBOL CETAK STRUK
            if (tipeCheckout === 'print') {
                let itemsHtml = "<table>";
                cart.forEach(item => {
                    itemsHtml += `
                        <tr><td colspan="2" class="bold uppercase">${escapeHTML(item.nama)}</td></tr>
                        <tr>
                            <td>${item.qty} x ${item.harga.toLocaleString('id-ID')}</td>
                            <td class="text-right">${(item.harga * item.qty).toLocaleString('id-ID')}</td>
                        </tr>
                    `;
                });
                itemsHtml += "</table>";
                
                let strukHtml = `
                    <div class="text-center bold" style="font-size:11pt; line-height:1.1">BARLA STORE</div>
                    <div class="text-center" style="font-size:8pt">(Ps. Sunggingan lt. 2)</div>
                    <div class="text-center" style="font-size:8pt">0822-2633-4999</div>
                    <div class="line"></div>
                    <table>
                        <tr><td class="text-right">${getTglStr()}</td></tr>
                        <tr><td class="text-right">${getJamStr()}</td></tr>
                    </table>
                    <div class="line"></div>
                    ${itemsHtml}
                    <div class="line"></div>
                    <table class="bold">
                        <tr><td style="width:50%">Total</td><td class="text-right">${t.toLocaleString('id-ID')}</td></tr>
                        <tr><td>Bayar</td><td class="text-right">${b.toLocaleString('id-ID')}</td></tr>
                        <tr><td colspan="2">&nbsp;</td></tr>
                        <tr><td>Kembali</td><td class="text-right">${(b - t).toLocaleString('id-ID')}</td></tr>
                    </table>
                    <div class="line"></div>
                    <div class="text-center bold">Terimakasih</div>
                `;
                
                document.getElementById('p-konten').innerHTML = strukHtml; 
                window.print(); 
            } 
            // JIKA TOMBOL WA
            else if (tipeCheckout === 'wa') {
                let waMsg = `*BARLA STORE*\n(Ps. Sunggingan lt. 2)\n0822-2633-4999\n--------------------------------\nTgl: ${getTglStr()}\nJam: ${getJamStr()}\n--------------------------------\n`;
                
                cart.forEach(item => {
                    waMsg += `*${item.nama.toUpperCase()}*\n${item.qty} x ${item.harga.toLocaleString('id-ID')} = ${(item.harga * item.qty).toLocaleString('id-ID')}\n\n`;
                });
                
                waMsg += `--------------------------------\n*Total   : Rp ${t.toLocaleString('id-ID')}*\n*Bayar   : Rp ${b.toLocaleString('id-ID')}*\n*Kembali : Rp ${(b - t).toLocaleString('id-ID')}*\n--------------------------------\nTerimakasih`;
                
                window.open(`https://wa.me/?text=${encodeURIComponent(waMsg)}`);
            }

            saveData(); cart = []; document.getElementById('i-bayar').value = ""; renderCart(); refreshDL();
        }

        // --- STOK LOGIC ---
        function mode(m) {
            document.getElementById('section-kasir').classList.toggle('hidden', m !== 'kasir');
            document.getElementById('section-stok').classList.toggle('hidden', m !== 'stok');
            document.getElementById('n-k').classList.toggle('active-nav', m === 'kasir');
            document.getElementById('n-s').classList.toggle('active-nav', m === 'stok');
            
            const hKasir = document.getElementById('h-kasir');
            const hStok = document.getElementById('h-stok');
            if (m === 'kasir') {
                hKasir.classList.remove('hidden');
                hStok.classList.add('hidden');
                hStok.classList.remove('flex');
            } else {
                hKasir.classList.add('hidden');
                hStok.classList.remove('hidden');
                hStok.classList.add('flex');
                tab(curTab);
            }
        }

        function tab(t) { curTab = t; ['sup', 'retur', 'lap'].forEach(id => document.getElementById('b-' + id).classList.toggle('tab-active', id === t)); document.getElementById('fab').style.display = (t === 'sup') ? 'flex' : 'none'; renderStok(t); }

        function renderStok(t) {
            const c = document.getElementById('stok-content'); c.innerHTML = "";
            if (t === 'sup') {
                if (db.supplier.length === 0) { c.innerHTML = "<div class='text-center py-20 font-black text-slate-300 uppercase'>Kosong</div>"; return; }
                db.supplier.forEach((s, i) => {
                    let bl = ""; s.barang.forEach((b, bi) => bl += `<div class="flex justify-between items-center py-2.5 border-b border-dashed"><div><b class="text-xs">${escapeHTML(b.nama)}</b><br><span class="text-blue-600 text-[10px]">Rp ${b.harga.toLocaleString('id-ID')} | ${escapeHTML(b.bc) || '-'}</span></div><div class="flex items-center gap-3"><b class="text-sm">${b.stok}</b><button onclick="openSheet('sup', ${i}, ${bi})" class="text-slate-300 text-lg px-2">⋮</button></div></div>`);
                    c.innerHTML += `
                        <div class="bg-white rounded-2xl border border-slate-100 p-4 mb-3 shadow-sm">
                            <div class="flex justify-between items-center" onclick="openIdx=(openIdx===${i}?null:${i});renderStok('sup')">
                                <b class="uppercase text-blue-900 text-sm">${escapeHTML(s.nama)}</b>
                                <button onclick="event.stopPropagation();delSup('${escapeHTML(s.nama)}')" class="text-red-500 p-1">✕</button>
                            </div>
                            <div class="${openIdx === i ? '' : 'hidden'} mt-3 space-y-2">
                                <div class="flex gap-2">
                                    <input id="ib-n-${i}" placeholder="NAMA BARANG" class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:border-blue-600">
                                    <button onclick="toggleScanner('ib-bc-${i}')" class="active:scale-75 transition">
                                        <div class="premium-scan w-10 h-10 border-2 border-blue-900"></div>
                                    </button>
                                </div>
                                <input id="ib-bc-${i}" inputmode="numeric" placeholder="BARCODE" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:border-blue-600">
                                <div class="flex gap-2">
                                    <input id="ib-h-${i}" inputmode="numeric" oninput="formatRupiah(this)" placeholder="HARGA" class="w-1/2 p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:border-blue-600">
                                    <input id="ib-s-${i}" inputmode="numeric" type="number" placeholder="STOK" class="w-1/2 p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:border-blue-600">
                                </div>
                                <button onclick="addB(${i})" class="w-full bg-blue-900 text-white py-3 mt-1 rounded-xl font-bold uppercase text-xs shadow-md active:scale-95 transition">Simpan Barang</button>
                                <div class="mt-2 border-t pt-1">${bl}</div>
                            </div>
                        </div>`;
                });
            } else if (t === 'retur') {
                const g = db.retur.reduce((a, r) => { (a[r.sup] = a[r.sup] || []); a[r.sup].push(r); return a; }, {});
                if (Object.keys(g).length === 0) { c.innerHTML = "<div class='text-center py-20 font-black text-slate-300 uppercase'>Kosong</div>"; return; }
                c.innerHTML = `<button onclick="printReturSemua()" class="w-full bg-blue-900 text-white py-3 rounded-xl font-black text-xs uppercase mb-4 shadow-md active:scale-95 transition">Print Semua Retur</button>`;
                for (let s in g) { let items = ""; g[s].forEach(r => items += `<div class="text-[11px] py-2 border-b border-dashed flex justify-between"><span>• ${escapeHTML(r.nama)}</span><b>${r.qty} Pcs</b></div>`); c.innerHTML += `<div class="bg-white p-4 rounded-2xl border border-slate-100 mb-3 shadow-sm"><div class="flex justify-between items-center mb-2"><b class="uppercase text-blue-900 text-sm">${escapeHTML(s)}</b><button onclick="openSheet('retur', '${escapeHTML(s)}')" class="text-slate-300 text-lg px-2">⋮</button></div>${items}</div>`; }
            } else if (t === 'lap') {
                let has = false; let lapH = `<button onclick="printLapSemua()" class="w-full bg-blue-900 text-white py-3 rounded-xl font-black text-xs uppercase mb-4 shadow-md active:scale-95 transition">Print Laporan Stok</button>`;
                db.supplier.forEach((s, i) => { let k = s.barang.filter(x => x.stok < 30); if (k.length > 0) { has = true; let bl = ""; k.forEach(b => bl += `<div class="text-[11px] py-2 border-b border-dashed flex justify-between"><span>• ${escapeHTML(b.nama)}</span><b class="text-red-500">${b.stok}</b></div>`); lapH += `<div class="bg-white p-4 rounded-2xl border border-slate-100 mb-3 shadow-sm"><div class="flex justify-between mb-2"><b class="uppercase text-blue-900 text-sm">${escapeHTML(s.nama)}</b><button onclick="openSheet('lap', ${i})" class="text-slate-300 text-lg px-2">⋮</button></div>${bl}</div>`; } });
                c.innerHTML = has ? lapH : "<div class='text-center py-20 font-black text-slate-300 uppercase'>Stok Aman</div>";
            }
        }

        function openSheet(type, i1, i2) {
            const s = document.getElementById('a-sheet'), o = document.getElementById('sheet-opts'); s.style.display = 'flex'; o.innerHTML = ""; setTimeout(() => s.classList.add('sheet-active'), 10);
            if (type === 'sup') { selS = i1; selB = i2; o.innerHTML = `<button onclick="action('stok')" class="p-3.5 bg-blue-50 text-blue-900 rounded-xl font-bold text-center text-sm">Edit Stok</button><button onclick="action('harga')" class="p-3.5 bg-blue-50 text-blue-900 rounded-xl font-bold text-center text-sm">Edit Harga</button><button onclick="action('retur')" class="p-3.5 bg-orange-50 text-orange-600 rounded-xl font-bold text-center text-sm">Retur Barang</button><button onclick="action('hapus')" class="p-3.5 bg-red-50 text-red-600 rounded-xl font-bold text-center text-sm">Hapus Barang</button>`; }
            else if (type === 'retur') { 
                selRetur = i1;
                o.innerHTML = `
                    <button onclick="closeSheet();waR(selRetur)" class="p-3.5 bg-green-50 text-green-600 rounded-xl font-bold text-center text-sm">WhatsApp Retur</button>
                    <button onclick="closeSheet();printReturSup(selRetur)" class="p-3.5 bg-blue-50 text-blue-900 rounded-xl font-bold text-center text-sm">Print Struk Retur</button>
                    <button onclick="closeSheet();trHR(selRetur)" class="p-3.5 bg-red-50 text-red-600 rounded-xl font-bold text-center text-sm">Hapus Data Retur</button>
                `; 
            }
            else if (type === 'lap') { o.innerHTML = `<button onclick="closeSheet();waO(${i1})" class="p-3.5 bg-green-50 text-green-600 rounded-xl font-bold text-center text-sm">WhatsApp Order</button>`; }
        }

        function closeSheet(e) { if (e && e.target.id !== 'a-sheet') return; const s = document.getElementById('a-sheet'); s.classList.remove('sheet-active'); setTimeout(() => s.style.display = 'none', 300); }

        function action(type) {
            closeSheet(); const brg = db.supplier[selS].barang[selB];
            if (type === 'stok') {
                let curStok = brg.stok === 0 ? "" : brg.stok.toString();
                openModal("EDIT STOK", curStok, `Nama: ${brg.nama}`, (v) => { db.supplier[selS].barang[selB].stok = Math.abs(parseInt(v)) || 0; saveData(); }, "numeric");
            }
            if (type === 'harga') {
                let curHarga = brg.harga === 0 ? "" : brg.harga.toString();
                openModal("EDIT HARGA", curHarga, `Nama: ${brg.nama}`, (v) => { db.supplier[selS].barang[selB].harga = clean(v); saveData(); }, "numeric");
            }
            if (type === 'retur') {
                openModal("RETUR BARANG", "", `Nama: ${brg.nama}`, (v) => { 
                    let q = parseInt(v) || 0; 
                    if (q <= 0 || q > brg.stok) { openModal("GAGAL", "", "Jumlah retur tidak valid/melebihi stok!", null, "text"); return; }
                    db.supplier[selS].barang[selB].stok -= q; 
                    let adaRetur = db.retur.find(r => r.sup === db.supplier[selS].nama && r.nama === brg.nama);
                    if (adaRetur) adaRetur.qty += q; else db.retur.push({ sup: db.supplier[selS].nama, nama: brg.nama, qty: q }); 
                    saveData(); 
                }, "numeric");
            }
            if (type === 'hapus') openModal("KONFIRMASI HAPUS", "", `Yakin menghapus ${brg.nama}?`, () => { db.supplier[selS].barang.splice(selB, 1); saveData(); }, "danger");
        }

        function openModal(t, v, d, cb, type) { 
            const m = document.getElementById('b-modal'); document.getElementById('m-title').innerText = t; document.getElementById('m-desc').innerText = d; m.style.display = 'flex'; 
            const inp = document.getElementById('m-input'); inp.value = v; inp.inputMode = type === "numeric" ? "numeric" : "text";
            const hide = (type === 'danger' || t.includes("KURANG") || t.includes("KOSONG") || t.includes("YAKIN") || t.includes("GAGAL") || t.includes("STOK TIDAK") || t.includes("STOK AMAN") || t.includes("SUKSES") || t.includes("TERDAFTAR") || t.includes("BERUBAH"));
            document.getElementById('m-input-box').style.display = hide ? 'none' : 'block';
            document.getElementById('m-confirm').onclick = () => { if (cb) cb(inp.value); closeModal(); };
            document.getElementById('m-confirm').className = (type === 'danger') ? "flex-1 py-3 bg-red-600 text-white rounded-xl text-xs font-black shadow-md uppercase" : "flex-1 py-3 bg-blue-700 text-white rounded-xl text-xs font-black shadow-md uppercase";
            setTimeout(() => { if (document.getElementById('m-input-box').style.display !== 'none') inp.focus(); }, 300);
        }

        function closeModal() { document.getElementById('b-modal').style.display = 'none'; }
        function openModalSup() { openModal("TAMBAH SUPPLIER", "", "Nama Supplier:", (v) => { if (v && v.trim()) { db.supplier.unshift({ nama: v.trim(), barang: [] }); saveData(); } }, "text"); }
        function delSup(n) { openModal("HAPUS SUPPLIER", "", `Yakin hapus ${n}?`, () => { db.supplier = db.supplier.filter(x => x.nama !== n); openIdx = null; saveData(); }, "danger"); }
        
        function addB(i) { 
            const n = document.getElementById(`ib-n-${i}`).value.trim(), bc = document.getElementById(`ib-bc-${i}`).value.trim(), h = clean(document.getElementById(`ib-h-${i}`).value), s = Math.abs(parseInt(document.getElementById(`ib-s-${i}`).value)) || 0;
            if (!n || h <= 0) return; 
            let exist = db.supplier[i].barang.find(x => x.nama.toUpperCase() === n.toUpperCase());
            if (exist) { openModal("GAGAL", "", "Barang sudah ada! Silakan edit stok di daftar bawah.", null, "text"); return; }
            db.supplier[i].barang.unshift({ nama: n, bc: bc, harga: h, stok: s }); saveData(); 
            document.getElementById(`ib-n-${i}`).value = ""; document.getElementById(`ib-bc-${i}`).value = ""; document.getElementById(`ib-h-${i}`).value = ""; document.getElementById(`ib-s-${i}`).value = "";
        }

        // --- CSV IMPORT LOGIC GABUNG (SYNC) ---
        function exportCSV() { 
            let csv = "Supplier,Barang,Barcode,Harga,Stok\n"; 
            db.supplier.forEach(s => s.barang.forEach(b => csv += `"${s.nama}","${b.nama}","${b.bc}",${b.harga},${b.stok}\n`)); 
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' })); a.download = 'STOK_BARLA.csv'; a.click(); 
        }

        function importCSV(input) {
            if (!input.files || input.files.length === 0) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    let text = e.target.result.replace(/^\uFEFF/, '').trim();
                    const rows = text.split(/\r?\n/);
                    const sep = rows[0].includes(';') ? ';' : ',';
                    let totalSukses = 0;

                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i].trim();
                        if (!row) continue;
                        const cols = row.split(new RegExp(`${sep}(?=(?:(?:[^"]*"){2})*[^"]*$)`));
                        if (cols.length >= 5) {
                            const cleanV = (v) => (v || "").replace(/^"|"$/g, '').trim();
                            const sN = cleanV(cols[0]), bN = cleanV(cols[1]), bc = cleanV(cols[2]), pr = clean(cols[3]), st = Math.abs(parseInt(cols[4])) || 0;
                            
                            if (sN && bN) {
                                let supplier = db.supplier.find(x => x.nama.toLowerCase() === sN.toLowerCase());
                                if (!supplier) { supplier = { nama: sN, barang: [] }; db.supplier.unshift(supplier); }
                                
                                let barang = supplier.barang.find(x => x.nama.toLowerCase() === bN.toLowerCase());
                                if (barang) {
                                    barang.bc = bc; barang.harga = pr; barang.stok = st;
                                } else {
                                    supplier.barang.unshift({ nama: bN, bc: bc, harga: pr, stok: st });
                                }
                                totalSukses++;
                            }
                        }
                    }
                    if (totalSukses > 0) { saveData(); openModal("SUKSES IMPORT", "", `Berhasil Update/Sinkronisasi ${totalSukses} data!`, () => location.reload(), "text"); }
                } catch (err) { openModal("ERROR IMPORT", "", "Format file salah!", null, "text"); }
            };
            reader.readAsText(input.files[0]);
        }

        // --- CETAK & WA ---
        function trHR(sn) { openModal("YAKIN HAPUS?", "", `Data retur ${sn} dihapus.`, () => { db.retur = db.retur.filter(x => x.sup !== sn); saveData(); renderStok('retur'); }, "danger"); }
        
        function printReturSemua() { 
            let h = `<div class="text-center bold" style="font-size:11pt">DATA RETUR SEMUA BARANG</div><div class="text-center">(${getTglStr()})</div><br>`; 
            const g = db.retur.reduce((a, r) => { (a[r.sup] = a[r.sup] || []); a[r.sup].push(r); return a; }, {});
            for (let s in g) { h += `<div class="bold uppercase mt-2">${escapeHTML(s)}</div><table>`; g[s].forEach(r => h += `<tr><td>• ${escapeHTML(r.nama)}</td><td class="text-right">${r.qty} pcs</td></tr>`); h += `</table><br>`; } 
            h += `<div>Toko BARLA</div><div>(ps. sunggingan lt. 2)</div>`;
            document.getElementById('p-konten').innerHTML = h; window.print(); 
        }

        function printReturSup(sn) { 
            let h = `<div class="text-center bold" style="font-size:11pt">DATA RETUR BARANG</div><div class="text-center">(${getTglStr()})</div><br><div class="bold uppercase mt-2">${escapeHTML(sn)}</div><table>`; 
            db.retur.filter(x => x.sup === sn).forEach(r => h += `<tr><td>• ${escapeHTML(r.nama)}</td><td class="text-right">${r.qty} pcs</td></tr>`); 
            h += `</table><br><div>Toko BARLA</div><div>(ps. sunggingan lt. 2)</div>`;
            document.getElementById('p-konten').innerHTML = h; window.print(); 
        }

        function printLapSemua() { 
            let h = `<div class="text-center bold" style="font-size:12pt">LAPORAN STOK TIPIS</div><div class="text-center">(${getTglStr()})</div><div class="line"></div>`; 
            let has = false; 
            db.supplier.forEach(s => { 
                const k = s.barang.filter(b => b.stok < 30); 
                if (k.length > 0) { 
                    has = true; h += `<div class="bold uppercase mt-2">[ ${escapeHTML(s.nama)} ]</div><table>`; 
                    k.forEach(b => h += `<tr><td>• ${escapeHTML(b.nama)}</td><td class="text-right">Sisa: ${b.stok}</td></tr>`); 
                    h += `</table><div class="line" style="border-bottom:1px dotted"></div>`; 
                } 
            }); 
            if (!has) return openModal("STOK AMAN", "", "Tidak ada stok kritis.", null, "text"); 
            document.getElementById('p-konten').innerHTML = h; window.print(); 
        }

        function waR(sn) { 
            let m = `DATA RETUR BARANG\n(${getTglStr()})\n\n*${sn.toUpperCase()}*\n`; 
            db.retur.filter(x => x.sup === sn).forEach(r => m += `• ${r.nama} : ${r.qty} pcs\n`); 
            m += `\n*Toko BARLA*\n(ps. sunggingan lt. 2)`; window.open(`https://wa.me/?text=${encodeURIComponent(m)}`); 
        }

        function waO(i) { 
            let s = db.supplier[i], m = `*ORDER*\n(${getTglStr()})\n\n*${s.nama.toUpperCase()}*\n`; 
            s.barang.filter(b => b.stok < 30).forEach(b => m += `• ${b.nama} : \n`); 
            m += `\n*Toko BARLA*\n(ps. sunggingan lt. 2)`; window.open(`https://wa.me/?text=${encodeURIComponent(m)}`); 
        }
    </script>
</body>
